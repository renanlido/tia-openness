name: 💡 Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point behind the request.
      placeholder: "I'm trying to … but currently I have to …"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? An endpoint, a tool, a GUI option, a doc…
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you weighed.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: TIA version, CPU family, scale, or anything else that helps prioritize.
    validations:
      required: false
