name: 🐛 Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please run **API → Check environment** (or `tia_ping`) first —
        it catches most setup issues. See [SUPPORT.md](../../SUPPORT.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened?
      placeholder: Include the exact error text / response envelope if you have it.
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: The `app-v*` tag (shown in the GUI / installer).
      placeholder: app-v1.3.1
    validations:
      required: true
  - type: input
    id: tia-cpu
    attributes:
      label: TIA Portal version & target CPU
      description: TIA version and the controller (with firmware) if hardware is involved.
      placeholder: TIA Portal V21 · S7-1200 1214C · FW V4.4.1
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: How were you driving the API?
      options:
        - Directly (HTTP / GUI / CLI)
        - Via the tia MCP
        - Via the tia-harness plugin
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps so we can reproduce it.
      placeholder: |
        1. …
        2. …
    validations:
      required: false
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Output of "Check environment" / `tia_ping`, and any relevant logs.
      render: text
    validations:
      required: false
